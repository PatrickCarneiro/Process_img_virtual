<style>

  /* ABA FECHADA DE ANÁLISES */

  .aba_analises {
    position: fixed; /* Fixa a aba na tela */
    left: 250px; /* Começa depois do menu lateral */
    right: 15px; /* Mantém espaço na direita */
    bottom: 0; /* Fica presa na parte inferior */
    height: 55px; /* Altura quando a aba está fechada */
    background: rgba(10,20,40,0.98);
    color: white;
    border: 1px solid rgba(192,132,252,0.35);
    border-radius: 20px 20px 0 0; /* Arredonda apenas a parte de cima */
    transition: height 0.3s ease, left 0.3s ease, right 0.3s ease, border-radius 0.3s ease;
    overflow: hidden; /* Esconde o conteúdo interno quando fechada */
    z-index: 100; /* Mantém a aba acima dos outros elementos */
  }

  /* ABA ABERTA DE ANÁLISES */

  .aba_analises.aberta {
    left: 0; /* Ocupa desde a esquerda da tela */
    right: 0; /* Ocupa até a direita da tela */
    bottom: 0;
    width: 100vw; /* Ocupa toda a largura */
    height: 100vh; /* Ocupa toda a altura */
    border-radius: 0; /* Remove arredondamento em tela cheia */
  }

  /* CABEÇALHO DA ABA DE ANÁLISES */

  .cabecalho_analises {
    height: 55px; /* Mesma altura da aba fechada */
    padding: 15px 20px;
    cursor: pointer; /* Indica que pode clicar */
    background: rgba(192,132,252,0.15);
    display: flex;
    justify-content: space-between; /* Deixa título à esquerda e ícone à direita */
    align-items: center;
  }

  /* CONTEÚDO INTERNO DAS ANÁLISES */

  .conteudo_analises {
    padding: 20px;
    display: grid; /* Organiza histograma e métricas em colunas */
    grid-template-columns: minmax(0, 1fr) minmax(260px, 360px); /* Gráfico maior + métricas à direita */
    gap: 20px;
  }
  .aba_analises.aberta .conteudo_analises {
    height: calc(100vh - 55px); /* Altura total menos o cabeçalho */
    overflow: auto; /* Permite rolagem dentro da aba */
  }

  /* ÁREA DO GRÁFICO DE ANÁLISE */

  .area_grafico_analise {
    display: flex;
    flex-direction: column; /* Organiza elementos um abaixo do outro */
    gap: 12px;
    position: relative; /* Permite posicionar elementos internos */
  }

  /* HISTOGRAMA */

  .titulo_histograma {
    text-align: center;
    font-size: 18px;
    font-weight: bold;
    color: white;
    margin-top: 4px;
  }
  .subtitulo_histograma {
    text-align: center;
    font-size: 13px;
    opacity: 0.75;
    margin-top: -6px;
  }
  #histograma {
    width: 100%; /* Ocupa toda a largura disponível */
    height: 65vh; /* Altura proporcional à tela */
    background: black;
    border-radius: 12px;
  }

  /* CONTROLE DA FAIXA DO HISTOGRAMA */

  .controle_faixa_histograma {
    display: flex;
    flex-direction: column;
    gap: 8px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 12px;
  }

  /* BARRA DA FAIXA DO HISTOGRAMA */

  .barra_faixa_histograma {
    position: relative; /* Referência para alças e faixa selecionada */
    width: 100%;
    height: 18px;
    background: rgba(255,255,255,0.12);
    border-radius: 20px;
    cursor: pointer;
  }

  /* REGIÃO SELECIONADA DO HISTOGRAMA */

  .faixa_selecionada_histograma {
    position: absolute;
    height: 100%;
    background: rgba(192,132,252,0.45);
    border-radius: 20px;
    left: 0%;
    width: 100%;
  }

  /* ALÇAS DA FAIXA DO HISTOGRAMA */

  .alca_faixa {
    position: absolute;
    top: 50%;
    width: 16px;
    height: 30px;
    background: #c084fc;
    border: 2px solid white;
    border-radius: 8px;
    transform: translate(-50%, -50%); /* Centraliza a alça na barra */
    cursor: ew-resize; /* Indica movimento horizontal */
    z-index: 2;
    box-shadow: 0 0 10px rgba(192,132,252,0.55);
  }
  .alca_faixa.esquerda {
    left: 0%; /* Posição inicial da alça esquerda */
  }
  .alca_faixa.direita {
    left: 100%; /* Posição inicial da alça direita */
  }
  .faixa_histograma {
    text-align: center;
    font-size: 13px;
    opacity: 0.85;
  }

  /* BOTÕES DOS CANAIS RGB */

  .botoes_canais_rgb {
    display: none; /* Só aparece quando a imagem é RGB */
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .botao_canal {
    padding: 8px 18px;
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 10px;
    background: rgba(255,255,255,0.06);
    color: white;
    cursor: pointer;
    font-family: Arial, sans-serif;
    transition: 0.3s;
  }
  .botao_canal:hover {
    background: rgba(192,132,252,0.25);
  }
  .botao_canal.ativo {
    background: rgba(192,132,252,0.45);
    box-shadow: 0 0 10px rgba(192,132,252,0.35);
  }

  /* BOTÕES DE TIPO DE ANÁLISE */

  .botoes_analise_imagem {
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  /* BOTÃO DA ABA DE ANÁLISE */

  .botao_analise {
    padding: 10px 22px;
    border: 1px solid rgba(192,132,252,0.45);
    border-radius: 12px;
    background: rgba(255,255,255,0.06);
    color: white;
    cursor: pointer;
    font-family: Arial, sans-serif;
    transition: 0.3s;
  }
  .botao_analise:hover {
    background: rgba(192,132,252,0.25);
  }
  .botao_analise.ativo {
    background: rgba(192,132,252,0.45);
    box-shadow: 0 0 10px rgba(192,132,252,0.35);
  }

  /* TOOLTIP DO HISTOGRAMA */

  .tooltip_histograma {
    position: fixed; /* Permite acompanhar a posição do mouse */
    display: none; /* Começa escondida */
    background: rgba(10,20,40,0.98);
    color: white;
    border: 1px solid rgba(192,132,252,0.55);
    border-radius: 10px;
    padding: 8px 10px;
    font-size: 12px;
    pointer-events: none; /* Não interfere no mouse */
    z-index: 9999;
    box-shadow: 0 0 12px rgba(0,0,0,0.45);
  }

  /* CARDS DE MÉTRICAS */

  .metrica {
    background: rgba(255,255,255,0.06);
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 8px;
    width: 100%;
    max-width: 100%;
    overflow: hidden; /* Evita texto sair da caixa */
  }

  /* NOME DO ARQUIVO ATUAL */

  #arquivoAtual {
    display: block;
    width: 100%;
    margin-top: 6px;
    word-break: break-word; /* Quebra nomes grandes */
    overflow-wrap: anywhere; /* Permite quebrar em qualquer ponto */
    white-space: normal;
    color: #c084fc;
    font-size: 13px;
  }

</style>
