<style>

  /* Aba fechada de análises */
  .aba_analises {
    position: fixed; /* Fixa na tela */
    left: 250px; /* Começa depois do menu lateral */
    right: 15px; /* Espaço à direita */
    bottom: 0; /* Fica grudada embaixo */
    height: 55px; /* Altura quando fechada */
    background: rgba(10,20,40,0.98); 
    color: white; 
    border: 1px solid rgba(192,132,252,0.35); 
    border-radius: 20px 20px 0 0; /* Arredonda só em cima */
    transition: height 0.3s ease, left 0.3s ease, right 0.3s ease, border-radius 0.3s ease;
    overflow: hidden; /* Esconde conteúdo quando fechada */
    z-index: 100; /* Fica acima dos outros elementos */
  }

  /* Aba aberta de análises */
  .aba_analises.aberta {
    left: 0; /* Ocupa desde a esquerda */
    right: 0; /* Ocupa até a direita */
    bottom: 0; /* Continua presa embaixo */
    width: 100vw; /* Ocupa toda a largura da tela */
    height: 100vh; /* Cresce até ocupar toda a altura */
    border-radius: 0; /* Remove arredondamento em tela cheia */
  }

  /* Cabeçalho clicável da aba de análises */
  .cabecalho_analises {
    height: 55px; /* Altura do cabeçalho */
    padding: 15px 20px; 
    cursor: pointer; 
    background: rgba(192,132,252,0.15); 
    display: flex; 
    justify-content: space-between; /* Joga um para cada lado */
    align-items: center; 
  }

  /* Conteúdo interno da análise */
  .conteudo_analises {
    padding: 20px;
    display: grid; /* Usa grid */
    grid-template-columns: 1fr 300px; /* Histograma maior + métricas à direita */
    gap: 20px; /* Espaço entre histograma e métricas */
  }

  /* Conteúdo quando a aba está aberta */
  .aba_analises.aberta .conteudo_analises {
    height: calc(100vh - 55px); /* Ocupa a tela menos o cabeçalho */
    overflow: auto; /* Permite rolagem interna */
  }

  /* Área que guarda o histograma, textos, controles e botões */
  .area_grafico_analise {
    display: flex;
    flex-direction: column;
    gap: 12px; /* Espaço entre os elementos */
    position: relative; /* Para posicionar elementos internos */
  }

  /* Título principal do histograma */
  .titulo_histograma {
    text-align: center;
    font-size: 18px;
    font-weight: bold;
    color: white;
    margin-top: 4px;
  }

  /* Subtítulo do histograma */
  .subtitulo_histograma {
    text-align: center;
    font-size: 13px;
    opacity: 0.75;
    margin-top: -6px;
  }

  /* Canvas do histograma */
  #histograma {
    width: 100%; /* Ocupa toda a largura disponível */
    height: 65vh; /* Altura relativa à tela */
    background: black; 
    border-radius: 12px; 
  }

  /* Área geral do seletor de faixa */
  .controle_faixa_histograma {
    display: flex;
    flex-direction: column;
    gap: 8px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 12px;
  }

  /* Barra onde as laterais são puxadas */
  .barra_faixa_histograma {
    position: relative;
    width: 100%;
    height: 18px;
    background: rgba(255,255,255,0.12);
    border-radius: 20px;
    cursor: pointer;
  }

  /* Região selecionada dentro da barra */
  .faixa_selecionada_histograma {
    position: absolute;
    height: 100%;
    background: rgba(192,132,252,0.45);
    border-radius: 20px;
    left: 0%;
    width: 100%;
  }

  /* Alças laterais para puxar */
  .alca_faixa {
    position: absolute;
    top: 50%;
    width: 16px;
    height: 30px;
    background: #c084fc;
    border: 2px solid white;
    border-radius: 8px;
    transform: translate(-50%, -50%);
    cursor: ew-resize;
    z-index: 2;
    box-shadow: 0 0 10px rgba(192,132,252,0.55);
  }

  /* Alça da esquerda */
  .alca_faixa.esquerda {
    left: 0%;
  }

  /* Alça da direita */
  .alca_faixa.direita {
    left: 100%;
  }

  /* Texto mostrando a região selecionada do histograma */
  .faixa_histograma {
    text-align: center;
    font-size: 13px;
    opacity: 0.85;
  }

  /* Botões dos canais RGB */
  .botoes_canais_rgb {
    display: none; /* Começa escondido e só aparece se a imagem for RGB */
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  /* Botões dos canais: Vermelho, Verde, Azul e Média */
  .botao_canal {
    padding: 8px 18px;
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 10px;
    background: rgba(255,255,255,0.06);
    color: white;
    cursor: pointer;
    font-family: Arial, sans-serif;
    transition: 0.3s;
  }

  /* Efeito ao passar o mouse nos botões dos canais */
  .botao_canal:hover {
    background: rgba(192,132,252,0.25);
  }

  /* Botão de canal ativo */
  .botao_canal.ativo {
    background: rgba(192,132,252,0.45);
    box-shadow: 0 0 10px rgba(192,132,252,0.35);
  }

  /* Área dos botões abaixo do histograma */
  .botoes_analise_imagem {
    display: flex; 
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  /* Botões da aba de análise */
  .botao_analise {
    padding: 10px 22px;
    border: 1px solid rgba(192,132,252,0.45);
    border-radius: 12px;
    background: rgba(255,255,255,0.06);
    color: white;
    cursor: pointer;
    font-family: Arial, sans-serif;
    transition: 0.3s;
  }

  /* Efeito ao passar o mouse */
  .botao_analise:hover {
    background: rgba(192,132,252,0.25);
  }

  /* Estilo para o botão ativo */
  .botao_analise.ativo {
    background: rgba(192,132,252,0.45);
    box-shadow: 0 0 10px rgba(192,132,252,0.35);
  }

  /* Caixa que aparece ao passar o mouse em cima da coluna */
  .tooltip_histograma {
    position: fixed;
    display: none;
    background: rgba(10,20,40,0.98);
    color: white;
    border: 1px solid rgba(192,132,252,0.55);
    border-radius: 10px;
    padding: 8px 10px;
    font-size: 12px;
    pointer-events: none;
    z-index: 9999;
    box-shadow: 0 0 12px rgba(0,0,0,0.45);
  }

  /* Cards de métricas */
  .metrica {
    background: rgba(255,255,255,0.06); 
    padding: 10px;
    border-radius: 10px; 
    margin-bottom: 8px; 
  }

</style>

<!-- Aba de análises -->
