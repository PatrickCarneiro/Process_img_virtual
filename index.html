<!DOCTYPE html> <!-- Define que o documento é HTML5 -->
<html lang="pt-BR"> <!-- Define o idioma da página como português do Brasil -->

<head>
  <meta charset="UTF-8"> <!-- Define a codificação de caracteres (acentos, ç, etc.) -->

  <title>Processamento de Imagens Médicas</title> <!-- Título da aba do navegador -->

  <!-- Importa a fonte Poppins do Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- Bibliotecas necessárias para ler e exibir arquivos DICOM -->
  <script src="https://unpkg.com/cornerstone-core@2.6.1/dist/cornerstone.js"></script> <!-- Biblioteca principal de visualização -->
  <script src="https://unpkg.com/dicom-parser@1.8.21/dist/dicomParser.js"></script> <!-- Parser de arquivos DICOM -->
  <script src="https://unpkg.com/cornerstone-wado-image-loader@4.13.2/dist/cornerstoneWADOImageLoader.bundle.min.js"></script> <!-- Loader para imagens DICOM -->

  <style>
    * { /* Aplica a todos os elementos */
      margin: 0; /* Remove margem padrão */
      padding: 0; /* Remove padding padrão */
      box-sizing: border-box; /* Faz padding e border entrarem no tamanho total */
    }

    body { /* Corpo da página */
      font-family: 'Poppins', sans-serif; /* Define a fonte */
      background: linear-gradient(135deg, #0b1d3a, #050c1a); /* Fundo degradê */
      color: white; /* Cor do texto */
      min-height: 100vh; /* Altura mínima da tela */
      display: flex; /* Layout flexível */
    }

    .sidebar { /* Menu lateral */
      width: 250px; /* Largura fixa */
      background: rgba(10, 20, 40, 0.9); /* Fundo semi-transparente */
      padding: 20px; /* Espaçamento interno */
      border-right: 1px solid rgba(255,255,255,0.05); /* Linha separadora */
    }

    .logo { /* Título/logo */
      font-size: 25px;
      font-weight: 600;
      margin-bottom: 50px;
    }

    .menu { /* Lista do menu */
      list-style: none; /* Remove bolinhas */
    }

    .menu li { /* Itens do menu */
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .menu .active { /* Item ativo */
      background: rgba(192,132,252,0.2);
      color: #c084fc;
    }

    .main { /* Área principal */
      flex: 1; /* Ocupa o espaço restante */
      padding: 40px;
      overflow-y: auto; /* Permite rolagem vertical */
    }

    .main h1 { /* Título principal */
      font-size: 52px;
      margin-bottom: 10px;
    }

    .main p { /* Texto descritivo */
      opacity: 0.7;
      margin-bottom: 30px;
    }

    .upload-box { /* Caixa de upload */
      border: 2px dashed rgba(255,255,255,0.2); /* Borda tracejada */
      border-radius: 20px;
      padding: 50px;
      text-align: center;
      background: rgba(255,255,255,0.02);
    }

    .button { /* Botões */
      margin-top: 20px;
      padding: 12px 25px;
      border-radius: 10px;
      background: rgba(255,255,255,0.08);
      border: none;
      color: white;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      transition: 0.3s;
    }

    .button:hover { /* Efeito ao passar o mouse */
      background: rgba(192,132,252,0.3);
    }

    #status { /* Texto de status */
      font-size: 14px;
      opacity: 0.7;
      margin-top: 15px;
    }

    .recent-title { /* Título das imagens recentes */
      margin-top: 35px;
      margin-bottom: 15px;
    }

    .recent-grid { /* Grid de miniaturas */
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); /* Layout responsivo */
      gap: 15px;
    }

    .thumb-card { /* Cada card de imagem */
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 15px;
      padding: 10px;
      cursor: pointer;
      text-align: center;
      transition: 0.3s;
    }

    .thumb-card:hover { /* Hover do card */
      background: rgba(192,132,252,0.18);
      transform: translateY(-3px);
    }

    .thumb-card img { /* Imagem normal */
      width: 100%;
      height: 90px;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 8px;
      background: black;
    }

    .dicom-thumb { /* Área para miniatura DICOM */
      width: 100%;
      height: 90px;
      border-radius: 10px;
      background: black;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .dicom-fallback { /* Caso DICOM não carregue */
      width: 100%;
      height: 90px;
      border-radius: 10px;
      background: black;
      color: #c084fc;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .thumb-name { /* Nome do arquivo */
      font-size: 12px;
      opacity: 0.8;
      word-break: break-word;
    }

    .selected { /* Estilo quando selecionado */
      border: 2px solid #c084fc !important;
      background: rgba(192,132,252,0.22);
    }

    @media (max-width: 800px) { /* Responsividade para celular */
      body {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
      }

      .main h1 {
        font-size: 34px;
      }

      .main {
        padding: 25px;
      }
    }
  </style>
</head>

<body>

  <!-- Menu lateral -->
  <div class="sidebar">
    <div class="logo">Processamento Imagem Médica</div>

    <!-- Itens do menu -->
    <ul class="menu">
      <li class="active">Início</li>
      <li>Projetos</li>
    </ul>
  </div>

  <!-- Conteúdo principal -->
  <div class="main">

    <!-- Título principal -->
    <h1>Comece seu processamento de imagens</h1>

    <!-- Descrição -->
    <p>Envie suas imagens médicas para iniciar o processamento.</p>

    <!-- Caixa de upload -->
    <div class="upload-box">

      <p>Escolher imagens ou arquivos DICOM</p>

      <p style="font-size: 12px; opacity: 0.6;">
        Formatos aceitos: PNG, JPG, JPEG, TIF, TIFF, DCM e DICOM
      </p>

      <!-- Input escondido para selecionar arquivos -->
      <input
        type="file"
        id="fileInput"
        multiple
        accept=".png,.jpg,.jpeg,.tif,.tiff,.dcm,.dicom"
        hidden
      >

      <!-- Botão que abre o seletor -->
      <button class="button" onclick="document.getElementById('fileInput').click()">
        Selecionar arquivos
      </button>

      <!-- Status -->
      <p id="status">Nenhum arquivo selecionado.</p>
    </div>

    <!-- Título das imagens recentes -->
    <h2 class="recent-title">Últimas imagens enviadas</h2>

    <!-- Grid onde as miniaturas serão inseridas via JS -->
    <div id="recentImages" class="recent-grid"></div>

    <!-- Botão para processar imagens selecionadas -->
    <div style="margin-top: 20px;">
      <button class="button" onclick="processSelected()">
        Processar selecionadas
      </button>
    </div>

  <!-- Script principal -->
  <script src="index.js"></script>

</body>
</html>
