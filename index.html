<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Processamento de Imagens Médicas</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0b1d3a, #050c1a);
      color: white;
      height: 100vh;
      display: flex;
    }

    .sidebar {
      width: 250px;
      background: rgba(10, 20, 40, 0.9);
      padding: 20px;
      border-right: 1px solid rgba(255,255,255,0.05);
    }

    .logo {
      font-size: 25px;
      font-weight: 600;
      margin-bottom: 50px;
    }

    .menu {
      list-style: none;
    }

    .menu li {
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .menu .active {
      background: rgba(192,132,252,0.2);
      color: #c084fc;
    }

    .main {
      flex: 1;
      padding: 40px;
    }

    .main h1 {
      font-size: 52px;
      margin-bottom: 10px;
    }

    .main p {
      opacity: 0.7;
      margin-bottom: 30px;
    }

    .upload-box {
      border: 2px dashed rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 50px;
      text-align: center;
      background: rgba(255,255,255,0.02);
    }

    .button {
      margin-top: 20px;
      padding: 12px 25px;
      border-radius: 10px;
      background: rgba(255,255,255,0.08);
      border: none;
      color: white;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
    }

    .button:hover {
      background: rgba(192,132,252,0.3);
    }

    #status {
      font-size: 14px;
      opacity: 0.7;
      margin-top: 15px;
    }
  </style>
</head>

<body>

  <div class="sidebar">
    <div class="logo">Processamento Imagem Médica</div>

    <ul class="menu">
      <li class="active">Início</li>
      <li>Projetos</li>
    </ul>
  </div>

  <div class="main">
    <h1>Comece seu processamento de imagens</h1>
    <p>Envie suas imagens médicas para iniciar o processamento.</p>

    <div class="upload-box">
      <p>Escolher imagens ou arquivos DICOM</p>

      <p style="font-size: 12px; opacity: 0.6;">
        Formatos aceitos: PNG, JPG, JPEG, TIF, TIFF, DCM e DICOM
      </p>

      <input
        type="file"
        id="fileInput"
        multiple
        accept=".png,.jpg,.jpeg,.tif,.tiff,.dcm,.dicom"
        hidden
      >

      <button class="button" onclick="document.getElementById('fileInput').click()">
        Selecionar arquivos
      </button>

      <p id="status">Nenhum arquivo selecionado.</p>
    </div>
  </div>

  <script>
    const fileInput = document.getElementById("fileInput");
    const statusText = document.getElementById("status");

    // Abre ou cria o banco IndexedDB
    function openDatabase() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open("MedicalImagesDB", 1);

        request.onupgradeneeded = function (event) {
          const db = event.target.result;

          if (!db.objectStoreNames.contains("files")) {
            db.createObjectStore("files", {
              keyPath: "id",
              autoIncrement: true
            });
          }
        };

        request.onsuccess = function () {
          resolve(request.result);
        };

        request.onerror = function () {
          reject(request.error);
        };
      });
    }

    // Limpa arquivos antigos
    function clearFiles(db) {
      return new Promise((resolve, reject) => {
        const transaction = db.transaction("files", "readwrite");
        const store = transaction.objectStore("files");
        const request = store.clear();

        request.onsuccess = () => resolve();
        request.onerror = () => reject(request.error);
      });
    }

    // Salva um arquivo no IndexedDB
    function saveFile(db, file, type) {
      return new Promise((resolve, reject) => {
        const transaction = db.transaction("files", "readwrite");
        const store = transaction.objectStore("files");

        const request = store.add({
          name: file.name,
          type: type,
          file: file
        });

        request.onsuccess = () => resolve();
        request.onerror = () => reject(request.error);
      });
    }

    fileInput.addEventListener("change", async function () {
      const files = Array.from(fileInput.files);

      if (files.length === 0) {
        statusText.innerText = "Nenhum arquivo selecionado.";
        return;
      }

      statusText.innerText = "Salvando arquivos...";

      try {
        const db = await openDatabase();

        await clearFiles(db);

        let validFiles = 0;

        for (const file of files) {
          const name = file.name.toLowerCase();

          const isDicom =
            name.endsWith(".dcm") ||
            name.endsWith(".dicom");

          const isImage =
            name.endsWith(".png") ||
            name.endsWith(".jpg") ||
            name.endsWith(".jpeg") ||
            name.endsWith(".tif") ||
            name.endsWith(".tiff");

          if (isDicom || isImage) {
            await saveFile(db, file, isDicom ? "dicom" : "image");
            validFiles++;
          }
        }

        if (validFiles === 0) {
          statusText.innerText = "Nenhum arquivo válido selecionado.";
          return;
        }

        statusText.innerText = "Arquivos carregados. Abrindo processamento...";

        window.location.href = "processamento.html";

      } catch (error) {
        console.error(error);
        statusText.innerText = "Erro ao salvar os arquivos.";
      }
    });
  </script>

</body>
</html>
