<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Processamento de Imagens Médicas</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #0b1d3a, #050c1a);
  color: white;
  height: 100vh;
  display: flex;
}

.sidebar {
  width: 250px;
  background: rgba(10,20,40,0.9);
  padding: 20px;
}

.logo {
  font-size: 25px;
  font-weight: 600;
  margin-bottom: 40px;
}

.menu {
  list-style: none;
}

.menu li {
  padding: 10px;
}

.menu .active {
  color: #c084fc;
}

.main {
  flex: 1;
  padding: 40px;
  overflow-y: auto;
}

.upload-box {
  border: 2px dashed rgba(255,255,255,0.2);
  border-radius: 20px;
  padding: 40px;
  text-align: center;
}

.button {
  margin-top: 15px;
  padding: 10px 20px;
  background: rgba(255,255,255,0.1);
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 10px;
}

.recent-grid {
  margin-top: 25px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px,1fr));
  gap: 12px;
}

.card {
  background: rgba(255,255,255,0.05);
  border-radius: 12px;
  padding: 8px;
  cursor: pointer;
}

.card:hover {
  background: rgba(192,132,252,0.2);
}

.card img {
  width: 100%;
  height: 80px;
  object-fit: cover;
  border-radius: 8px;
}

.dicom {
  height: 80px;
  background: black;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #c084fc;
  border-radius: 8px;
}

.name {
  font-size: 11px;
  margin-top: 5px;
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">Processamento</div>
  <ul class="menu">
    <li class="active">Início</li>
    <li>Projetos</li>
  </ul>
</div>

<div class="main">

<h1>Upload de imagens</h1>
<p>Selecione arquivos para iniciar</p>

<div class="upload-box">
  <input type="file" id="fileInput" multiple accept=".png,.jpg,.jpeg,.tif,.tiff,.dcm" hidden>
  <button class="button" onclick="fileInput.click()">Selecionar arquivos</button>
  <p id="status">Nenhum arquivo selecionado</p>
</div>

<h2 style="margin-top:25px;">Últimas imagens</h2>
<div id="recent" class="recent-grid"></div>

</div>

<script>
const fileInput = document.getElementById("fileInput");
const statusText = document.getElementById("status");
const recentDiv = document.getElementById("recent");

/* =====================
   BANCO (AUTO ATUALIZA)
===================== */
function openDB(){
  return new Promise((res,rej)=>{
    const req = indexedDB.open("DB", 2);

    req.onupgradeneeded = e=>{
      const db = e.target.result;

      if(!db.objectStoreNames.contains("files")){
        db.createObjectStore("files",{keyPath:"id",autoIncrement:true});
      }

      if(!db.objectStoreNames.contains("recent")){
        db.createObjectStore("recent",{keyPath:"id",autoIncrement:true});
      }
    };

    req.onsuccess = ()=>res(req.result);
    req.onerror = ()=>rej(req.error);
  });
}

/* =====================
   SALVAR
===================== */
async function saveFiles(files){
  const db = await openDB();

  // limpa arquivos atuais
  let tx = db.transaction("files","readwrite");
  tx.objectStore("files").clear();

  for(const file of files){
    const type = file.name.endsWith(".dcm") ? "dicom" : "image";

    const data = {
      name: file.name,
      file: file,
      type: type,
      time: Date.now()
    };

    // salva no files
    let tx1 = db.transaction("files","readwrite");
    tx1.objectStore("files").add(data);

    // salva no histórico
    let tx2 = db.transaction("recent","readwrite");
    tx2.objectStore("recent").add(data);
  }

  trimRecent(db);

  window.location.href="processamento.html";
}

/* =====================
   MANTER 10
===================== */
async function trimRecent(db){
  const tx = db.transaction("recent","readonly");
  const store = tx.objectStore("recent");
  const req = store.getAll();

  req.onsuccess = async ()=>{
    let items = req.result;
    items.sort((a,b)=>b.time-a.time);

    const excess = items.slice(10);

    for(const item of excess){
      let txDel = db.transaction("recent","readwrite");
      txDel.objectStore("recent").delete(item.id);
    }
  };
}

/* =====================
   CARREGAR MINIATURAS
===================== */
async function loadRecent(){
  const db = await openDB();

  const tx = db.transaction("recent","readonly");
  const store = tx.objectStore("recent");
  const req = store.getAll();

  req.onsuccess = ()=>{
    const items = req.result.sort((a,b)=>b.time-a.time);

    recentDiv.innerHTML="";

    items.forEach(item=>{
      const card = document.createElement("div");
      card.className="card";

      if(item.type==="image"){
        const img = document.createElement("img");
        img.src = URL.createObjectURL(item.file);
        card.appendChild(img);
      }else{
        const d = document.createElement("div");
        d.className="dicom";
        d.innerText="DICOM";
        card.appendChild(d);
      }

      const name = document.createElement("div");
      name.className="name";
      name.innerText=item.name;

      card.appendChild(name);

      card.onclick = async ()=>{
        const db = await openDB();

        let tx = db.transaction("files","readwrite");
        let store = tx.objectStore("files");

        store.clear();

        store.add(item);

        window.location.href="processamento.html";
      };

      recentDiv.appendChild(card);
    });
  };
}

/* =====================
   EVENTO UPLOAD
===================== */
fileInput.addEventListener("change", ()=>{
  const files = Array.from(fileInput.files);

  if(files.length===0){
    statusText.innerText="Nenhum arquivo";
    return;
  }

  statusText.innerText="Salvando...";
  saveFiles(files);
});

loadRecent();
</script>

</body>
</html>
