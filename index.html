<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Processamento de Imagens Médicas</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- Bibliotecas para ler DICOM -->
  <script src="https://unpkg.com/cornerstone-core@2.6.1/dist/cornerstone.js"></script>
  <script src="https://unpkg.com/dicom-parser@1.8.21/dist/dicomParser.js"></script>
  <script src="https://unpkg.com/cornerstone-wado-image-loader@4.13.2/dist/cornerstoneWADOImageLoader.bundle.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0b1d3a, #050c1a);
      color: white;
      min-height: 100vh;
      display: flex;
    }

    .sidebar {
      width: 250px;
      background: rgba(10, 20, 40, 0.9);
      padding: 20px;
      border-right: 1px solid rgba(255,255,255,0.05);
    }

    .logo {
      font-size: 25px;
      font-weight: 600;
      margin-bottom: 50px;
    }

    .menu {
      list-style: none;
    }

    .menu li {
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .menu .active {
      background: rgba(192,132,252,0.2);
      color: #c084fc;
    }

    .main {
      flex: 1;
      padding: 40px;
      overflow-y: auto;
    }

    .main h1 {
      font-size: 52px;
      margin-bottom: 10px;
    }

    .main p {
      opacity: 0.7;
      margin-bottom: 30px;
    }

    .upload-box {
      border: 2px dashed rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 50px;
      text-align: center;
      background: rgba(255,255,255,0.02);
    }

    .button {
      margin-top: 20px;
      padding: 12px 25px;
      border-radius: 10px;
      background: rgba(255,255,255,0.08);
      border: none;
      color: white;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      transition: 0.3s;
    }

    .button:hover {
      background: rgba(192,132,252,0.3);
    }

    #status {
      font-size: 14px;
      opacity: 0.7;
      margin-top: 15px;
    }

    .recent-title {
      margin-top: 35px;
      margin-bottom: 15px;
    }

    .recent-actions {
      margin-bottom: 20px;
    }

    .recent-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 15px;
    }

    .thumb-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 15px;
      padding: 10px;
      cursor: pointer;
      text-align: center;
      transition: 0.3s;
    }

    .thumb-card:hover {
      background: rgba(192,132,252,0.18);
      transform: translateY(-3px);
    }

    .thumb-card img {
      width: 100%;
      height: 90px;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 8px;
      background: black;
    }

    .dicom-thumb {
      width: 100%;
      height: 90px;
      border-radius: 10px;
      background: black;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .dicom-fallback {
      width: 100%;
      height: 90px;
      border-radius: 10px;
      background: black;
      color: #c084fc;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .thumb-name {
      font-size: 12px;
      opacity: 0.8;
      word-break: break-word;
    }

    .selected {
      border: 2px solid #c084fc !important;
      background: rgba(192,132,252,0.22);
    }

    @media (max-width: 800px) {
      body {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
      }

      .main h1 {
        font-size: 34px;
      }

      .main {
        padding: 25px;
      }
    }
  </style>
</head>

<body>

  <div class="sidebar">
    <div class="logo">Processamento Imagem Médica</div>

    <ul class="menu">
      <li class="active">Início</li>
      <li>Projetos</li>
    </ul>
  </div>

  <div class="main">

    <h1>Comece seu processamento de imagens</h1>
    <p>Envie suas imagens médicas para iniciar o processamento.</p>

    <div class="upload-box">
      <p>Escolher imagens ou arquivos DICOM</p>

      <p style="font-size: 12px; opacity: 0.6;">
        Formatos aceitos: PNG, JPG, JPEG, TIF, TIFF, DCM e DICOM
      </p>

      <input
        type="file"
        id="fileInput"
        multiple
        accept=".png,.jpg,.jpeg,.tif,.tiff,.dcm,.dicom"
        hidden
      >

      <button class="button" onclick="document.getElementById('fileInput').click()">
        Selecionar arquivos
      </button>

      <p id="status">Nenhum arquivo selecionado.</p>
    </div>

    <h2 class="recent-title">Últimas imagens enviadas</h2>

    <div class="recent-actions">
      <button class="button" onclick="processSelected()">
        Processar selecionadas
      </button>
    </div>

    <div id="recentImages" class="recent-grid"></div>

  </div>

  <script src="index.js"></script>

</body>
</html>
