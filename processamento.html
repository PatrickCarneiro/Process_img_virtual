<!DOCTYPE html> 
<html lang="pt-BR"> 

<head> 

<meta charset="UTF-8"> 

<title>Processamento</title> 

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<!-- Bibliotecas para DICOM -->
<script src="https://unpkg.com/cornerstone-core@2.6.1/dist/cornerstone.js"></script>
<script src="https://unpkg.com/dicom-parser@1.8.21/dist/dicomParser.js"></script>
<script src="https://unpkg.com/cornerstone-wado-image-loader@4.13.2/dist/cornerstoneWADOImageLoader.bundle.min.js"></script>

<style> /* Início do CSS */

/* Aplica estilo base para todos os elementos */
* {
  margin: 0; /* Remove a margem padrão */
  padding: 0; /* Remove o espaçamento interno padrão */
  box-sizing: border-box; /* Faz padding e borda entrarem no tamanho total do elemento */
}

/* Estiliza o corpo da página */
body {
  font-family: Arial, sans-serif; /* Define a fonte principal */
  background: linear-gradient(135deg, #0b1d3a, #050c1a); /* Define fundo em degradê escuro */
  color: white; /* Define a cor padrão do texto como branca */
  min-height: 100vh; /* Faz o corpo ocupar no mínimo toda a altura da tela */
  display: flex; /* Coloca o menu lateral e o conteúdo lado a lado */
  overflow-x: hidden; /* Impede rolagem horizontal da página */
  overflow-y: auto; /* Permite rolagem vertical da página */
}

/* ===================== */
/* MENU LATERAL */
/* ===================== */

/* Estiliza o menu lateral */
.menulateral {
  width: 230px; /* Define a largura inicial do menu */
  min-height: 100vh; /* Faz o menu ocupar toda a altura da tela */
  background: rgba(10, 20, 40, 0.95); /* Define fundo azul escuro com transparência */
  color: white; /* Define cor do texto do menu */
  padding: 20px; /* Espaçamento interno do menu */
  transition: 0.3s; /* Suaviza mudanças de tamanho */
  position: sticky; /* Mantém o menu fixo durante a rolagem */
  top: 0; /* Cola o menu no topo */
  border-right: 1px solid rgba(255,255,255,0.08); /* Linha divisória à direita */
}

/* Estado fechado do menu lateral */
.menulateral.fechado {
  width: 70px; /* Reduz a largura do menu quando fechado */
}

/* Estiliza o logo/texto principal do menu */
.logo {
  font-size: 20px; /* Define tamanho do texto */
  font-weight: bold; /* Deixa o texto em negrito */
  margin-bottom: 25px; /* Espaço abaixo do logo */
}

/* Esconde o logo e textos quando o menu está fechado */
.menulateral.fechado .logo,
.menulateral.fechado .texto-menu {
  display: none; /* Oculta esses elementos */
}

/* Botão de abrir/fechar menu */
.botao-menu {
  width: 100%; /* Ocupa toda a largura disponível */
  padding: 10px; /* Espaçamento interno */
  border: none; /* Remove borda padrão */
  border-radius: 10px; /* Arredonda os cantos */
  background: rgba(192,132,252,0.25); /* Fundo roxo transparente */
  color: white; /* Cor do texto */
  cursor: pointer; /* Mostra cursor de clique */
  margin-bottom: 20px; /* Espaço abaixo do botão */
}

/* Itens do menu */
.menu-item {
  padding: 12px; /* Espaçamento interno */
  border-radius: 10px; /* Arredonda cantos */
  margin-bottom: 10px; /* Espaço entre itens */
  cursor: pointer; /* Mostra que é clicável */
  background: rgba(255,255,255,0.06); /* Fundo branco transparente */
}

/* Efeito ao passar o mouse nos itens do menu */
.menu-item:hover {
  background: rgba(192,132,252,0.25); /* Muda para roxo transparente */
}

/* ===================== */
/* LAYOUT PRINCIPAL */
/* ===================== */

/* Área principal da página */
.principal {
  flex: 1; /* Ocupa o espaço restante ao lado do menu */
  display: grid; /* Usa grid para organizar os painéis */
  grid-template-columns: 260px minmax(500px, 1fr) 320px; /* Define colunas: ferramentas, imagem e fluxograma */
  grid-template-rows: auto auto; /* Define duas linhas automáticas */
  gap: 15px; /* Espaço entre os blocos */
  padding: 15px; /* Espaçamento interno geral */
  padding-bottom: 90px; /* Espaço extra embaixo para a aba de análises */
}

/* Painéis gerais */
.painel {
  background: rgba(255,255,255,0.04); /* Fundo branco bem transparente */
  border: 1px solid rgba(255,255,255,0.08); /* Borda clara transparente */
  border-radius: 20px; /* Arredonda o painel */
  padding: 18px; /* Espaçamento interno */
  overflow: auto; /* Permite rolagem se o conteúdo passar do tamanho */
}

/* ===================== */
/* FERRAMENTAS */
/* ===================== */

/* Título das categorias de ferramentas */
.categoria-titulo {
  background: rgba(192,132,252,0.30); /* Fundo roxo mais forte para diferenciar das opções */
  color: #ffffff; /* Texto branco */
  padding: 13px; /* Espaçamento interno */
  border-radius: 12px; /* Arredonda cantos */
  margin-bottom: 8px; /* Espaço abaixo */
  cursor: pointer; /* Mostra que pode clicar */
  font-weight: bold; /* Deixa em negrito */
  border: 1px solid rgba(192,132,252,0.45); /* Borda roxa */
  transition: 0.3s; /* Suaviza o hover */
}

/* Efeito ao passar o mouse sobre categoria */
.categoria-titulo:hover {
  background: rgba(192,132,252,0.45); /* Deixa o roxo mais forte */
}

/* Área que guarda as opções dentro de uma categoria */
.categoria-conteudo {
  display: none; /* Começa fechada */
  margin-bottom: 15px; /* Espaço abaixo da categoria aberta */
  padding-left: 8px; /* Recuo à esquerda */
  border-left: 2px solid rgba(192,132,252,0.35); /* Linha lateral roxa */
}

/* Cada ferramenta/opção */
.ferramenta {
  padding: 10px; /* Espaçamento interno */
  background: rgba(255,255,255,0.07); /* Fundo diferente da categoria */
  border: 1px solid rgba(255,255,255,0.08); /* Borda suave */
  border-radius: 10px; /* Arredonda cantos */
  margin-bottom: 8px; /* Espaço entre opções */
  cursor: pointer; /* Indica clique */
  transition: 0.3s; /* Suaviza mudança no hover */
}

/* Efeito ao passar o mouse na ferramenta */
.ferramenta:hover {
  background: rgba(255,255,255,0.15); /* Clareia a opção */
}

/* Área onde aparecem os parâmetros da ferramenta */
.parametros {
  background: rgba(255,255,255,0.06); /* Fundo transparente */
  border: 1px solid rgba(255,255,255,0.08); /* Borda suave */
  border-radius: 14px; /* Arredonda cantos */
  padding: 12px; /* Espaçamento interno */
  margin-top: 15px; /* Espaço acima */
  display: none; /* Começa escondida */
}

/* Título dentro da área de parâmetros */
.parametros h4 {
  margin-bottom: 10px; /* Espaço abaixo do título */
  color: #c084fc; /* Cor roxa */
}

/* Rótulos dos campos */
.parametros label {
  display: block; /* Cada label fica em linha própria */
  font-size: 13px; /* Tamanho do texto */
  margin-top: 8px; /* Espaço acima */
}

/* Campos de entrada e seleção */
.parametros input,
.parametros select {
  width: 100%; /* Ocupa toda a largura */
  padding: 8px; /* Espaçamento interno */
  margin-top: 4px; /* Espaço acima */
  border-radius: 8px; /* Arredonda cantos */
  border: none; /* Remove borda padrão */
  outline: none; /* Remove contorno ao clicar */
}

/* Botão aplicar */
.botao-aplicar {
  width: 100%; /* Ocupa toda a largura */
  padding: 10px; /* Espaçamento interno */
  margin-top: 12px; /* Espaço acima */
  border: none; /* Remove borda */
  border-radius: 10px; /* Arredonda cantos */
  background: rgba(192,132,252,0.35); /* Fundo roxo */
  color: white; /* Texto branco */
  cursor: pointer; /* Indica clique */
}

/* Hover do botão aplicar */
.botao-aplicar:hover {
  background: rgba(192,132,252,0.55); /* Roxo mais forte */
}

/* ===================== */
/* VISUALIZAÇÃO */
/* ===================== */

/* Área central de visualização */
.area_visualizacao {
  display: flex; /* Usa flexbox */
  flex-direction: column; /* Organiza elementos em coluna */
  gap: 10px; /* Espaço entre elementos */
  align-items: center; /* Centraliza horizontalmente */
}

/* Título e status ocupam largura total */
.area_visualizacao h1,
.area_visualizacao p {
  width: 100%; /* Ocupa toda a largura */
}

/* Caixa onde a imagem é exibida */
.visualizacao_box {
  background: rgba(255,255,255,0.03); /* Fundo transparente */
  border: 1px solid rgba(255,255,255,0.08); /* Borda suave */
  border-radius: 20px; /* Arredonda cantos */
  padding: 12px; /* Espaçamento interno */
  overflow: auto; /* Permite rolagem se a imagem for maior */
  display: inline-flex; /* Faz o quadro adaptar ao conteúdo */
  justify-content: center; /* Centraliza horizontalmente */
  align-items: center; /* Centraliza verticalmente */
  max-width: 100%; /* Limita à largura disponível */
  max-height: 70vh; /* Limita à altura da tela */
}

/* Container DICOM */
#visualizadorDicom {
  background: black; /* Fundo preto atrás do DICOM */
  border-radius: 12px; /* Arredonda cantos */
  overflow: hidden; /* Esconde sobras */
  display: block; /* Exibe como bloco */
}

/* Imagem normal */
#imagemNormal {
  display: none; /* Começa escondida */
  width: auto; /* Mantém largura proporcional */
  height: auto; /* Mantém altura proporcional */
  max-width: 850px; /* Limita largura máxima */
  max-height: 65vh; /* Limita altura máxima */
  border-radius: 12px; /* Arredonda cantos */
  background: black; /* Fundo preto atrás da imagem */
  object-fit: contain; /* Mantém proporção */
}

/* ===================== */
/* FLUXOGRAMA */
/* ===================== */

/* Área onde os blocos do fluxo aparecem */
#areaFluxograma {
  display: flex; /* Usa flexbox */
  flex-direction: column; /* Organiza em coluna */
  align-items: center; /* Centraliza os blocos */
}

/* Bloco de ferramenta aplicada */
.bloco_fluxo {
  width: 100%; /* Ocupa toda a largura */
  padding: 12px; /* Espaçamento interno */
  background: rgba(192,132,252,0.18); /* Fundo roxo transparente */
  border: 1px solid rgba(192,132,252,0.45); /* Borda roxa */
  border-radius: 14px; /* Arredonda cantos */
  margin-bottom: 8px; /* Espaço abaixo */
  text-align: center; /* Centraliza texto */
}

/* Texto dos parâmetros dentro do bloco */
.bloco_parametros {
  margin-top: 6px; /* Espaço acima */
  font-size: 12px; /* Texto menor */
  opacity: 0.8; /* Deixa mais suave */
  text-align: left; /* Alinha texto à esquerda */
}

/* Seta entre blocos */
.seta {
  font-size: 24px; /* Tamanho da seta */
  color: #c084fc; /* Cor roxa */
  margin-bottom: 8px; /* Espaço abaixo */
}

/* Botão remover */
.remover {
  margin-top: 8px; /* Espaço acima */
  padding: 6px 10px; /* Espaçamento interno */
  border: none; /* Remove borda */
  border-radius: 8px; /* Arredonda cantos */
  background: rgba(255,80,80,0.25); /* Fundo vermelho transparente */
  color: white; /* Texto branco */
  cursor: pointer; /* Indica clique */
}

/* Hover do botão remover */
.remover:hover {
  background: rgba(255,80,80,0.45); /* Vermelho mais forte */
}

/* ===================== */
/* IMAGENS EMBAIXO */
/* ===================== */

/* Área inferior com imagens selecionadas */
.imagens_trabalho {
  grid-column: 1 / 4; /* Faz ocupar as três colunas do grid */
  display: flex; /* Organiza cards lado a lado */
  gap: 15px; /* Espaço entre cards */
  overflow-x: auto; /* Permite rolagem horizontal */
  min-height: 190px; /* Altura mínima */
}

/* Card de imagem */
.card_imagem {
  min-width: 180px; /* Largura mínima */
  max-width: 180px; /* Largura máxima */
  background: rgba(255,255,255,0.05); /* Fundo transparente */
  border: 1px solid rgba(255,255,255,0.08); /* Borda suave */
  border-radius: 18px; /* Arredonda cantos */
  padding: 12px; /* Espaçamento interno */
  cursor: pointer; 
  transition: 0.3s; /* Suaviza hover */
}

.card_imagem:hover {
  background: rgba(192,132,252,0.18); /* Fundo roxo suave */
  transform: translateY(-3px); /* Sobe um pouco */
}

/* Miniatura de imagem normal e DICOM */
.card_imagem img,
.dicom_thumb {
  width: 100%; /* Ocupa toda a largura do card */
  height: 120px; /* Altura fixa */
  object-fit: contain; /* Mostra imagem inteira */
  background: black; /* Fundo preto */
  border-radius: 12px; /* Arredonda cantos */
  margin-bottom: 8px; /* Espaço abaixo */
  overflow: hidden; /* Esconde sobras */
}

/* Nome do arquivo */
.nome_arquivo {
  font-size: 12px; /* Texto pequeno */
  opacity: 0.8; /* Texto mais suave */
  word-break: break-word; /* Quebra nomes grandes */
}

/* ===================== */
/* ABA DE ANÁLISES */
/* ===================== */

/* Aba fechada de análises */
.aba_analises {
  position: fixed; /* Fixa na tela */
  left: 250px; /* Começa depois do menu lateral */
  right: 15px; /* Espaço à direita */
  bottom: 0; /* Fica grudada embaixo */
  height: 55px; /* Altura quando fechada */
  background: rgba(10,20,40,0.98); /* Fundo escuro */
  color: white; /* Texto branco */
  border: 1px solid rgba(192,132,252,0.35); /* Borda roxa */
  border-radius: 20px 20px 0 0; /* Arredonda só em cima */
  transition: height 0.3s ease, left 0.3s ease, right 0.3s ease, border-radius 0.3s ease; /* Anima altura para subir */
  overflow: hidden; /* Esconde conteúdo quando fechada */
  z-index: 100; /* Fica acima dos outros elementos */
}

/* Aba aberta de análises */
.aba_analises.aberta {
  left: 0; /* Ocupa desde a esquerda */
  right: 0; /* Ocupa até a direita */
  bottom: 0; /* Continua presa embaixo */
  width: 100vw; /* Ocupa toda a largura da tela */
  height: 100vh; /* Cresce até ocupar toda a altura */
  border-radius: 0; /* Remove arredondamento em tela cheia */
}

/* Cabeçalho clicável da aba de análises */
.cabecalho_analises {
  height: 55px; /* Altura do cabeçalho */
  padding: 15px 20px; /* Espaçamento interno */
  cursor: pointer; /* Indica clique */
  background: rgba(192,132,252,0.15); /* Fundo roxo transparente */
  display: flex; /* Coloca título e ícone lado a lado */
  justify-content: space-between; /* Joga um para cada lado */
  align-items: center; /* Centraliza verticalmente */
}

/* Conteúdo interno da análise */
.conteudo_analises {
  padding: 20px; /* Espaçamento interno */
  display: grid; /* Usa grid */
  grid-template-columns: 1fr 300px; /* Histograma maior + métricas à direita */
  gap: 20px; /* Espaço entre histograma e métricas */
}

/* Conteúdo quando a aba está aberta */
.aba_analises.aberta .conteudo_analises {
  height: calc(100vh - 55px); /* Ocupa a tela menos o cabeçalho */
  overflow: auto; /* Permite rolagem interna */
}

/* Canvas do histograma */
#histograma {
  width: 100%; /* Ocupa toda a largura disponível */
  height: 75vh; /* Altura relativa à tela */
  background: black; /* Fundo preto */
  border-radius: 12px; /* Arredonda cantos */
}

/* Cards de métricas */
.metrica {
  background: rgba(255,255,255,0.06); /* Fundo transparente */
  padding: 10px; /* Espaçamento interno */
  border-radius: 10px; /* Arredonda cantos */
  margin-bottom: 8px; /* Espaço entre métricas */
}

</style> 

</head> 

<body> 

<!-- Menu lateral -->
<div class="menulateral" id="menulateral"> <!-- Container do menu lateral -->

  <button class="botao-menu" onclick="toggleMenu()">☰</button> <!-- Botão que abre/fecha o menu -->

  <div class="logo">Processamento Imagem Médica</div> <!-- Logo/título do menu -->

  <div class="menu-item" onclick="window.location.href='index.html'"> <!-- Item para voltar ao início -->
      <span class="texto-menu">Início</span> <!-- Texto do botão início -->
  </div> <!-- Fecha item início -->

  <div class="menu-item"> <!-- Item projetos -->
      <span class="texto-menu">Projetos</span> <!-- Texto do botão projetos -->
  </div> <!-- Fecha item projetos -->

</div> <!-- Fecha menu lateral -->

<!-- Área principal -->
<div class="principal"> <!-- Container principal do sistema -->

  <div class="painel"> <!-- Painel de ferramentas -->

    <h3>Ferramentas</h3> <!-- Título do painel -->

    <br> <!-- Quebra de linha -->

    <div class="categoria-titulo" onclick="toggleCategoria('filtros')">Filtros</div> <!-- Categoria clicável filtros -->

    <div class="categoria-conteudo" id="filtros"> <!-- Conteúdo da categoria filtros -->

      <div class="ferramenta" onclick="selecionarFerramenta('Filtro Gaussiano')">Filtro Gaussiano</div> <!-- Opção filtro gaussiano -->

    </div> <!-- Fecha categoria filtros -->

    <div class="parametros" id="parametros"></div> <!-- Área onde aparecem os parâmetros da ferramenta -->

  </div> <!-- Fecha painel ferramentas -->

  <div class="area_visualizacao"> <!-- Área central de visualização -->

    <h1>Área de processamento</h1> <!-- Título da área central -->

    <div class="visualizacao_box"> <!-- Caixa da imagem -->

      <div id="visualizadorDicom"></div> <!-- Container para imagem DICOM -->

      <img id="imagemNormal"> <!-- Elemento para imagem comum -->

    </div> <!-- Fecha caixa da imagem -->

    <p id="status">Carregando arquivos...</p> <!-- Texto de status -->

  </div> <!-- Fecha área de visualização -->

  <div class="painel"> <!-- Painel do fluxograma -->

    <h3>Fluxograma</h3> <!-- Título do fluxograma -->

    <br> <!-- Quebra de linha -->

    <div id="areaFluxograma"> <!-- Área onde os blocos do fluxo serão colocados -->

      <p style="opacity: 0.6;">Aplique uma ferramenta para montar o fluxo.</p> <!-- Mensagem inicial -->

    </div> <!-- Fecha área do fluxograma -->

  </div> <!-- Fecha painel do fluxograma -->

  <div class="painel imagens_trabalho" id="imagensTrabalho"></div> <!-- Área inferior com as imagens selecionadas -->

</div> <!-- Fecha área principal -->

<!-- Aba de análises -->
<div class="aba_analises" id="abaAnalises"> <!-- Container da aba de análises -->

  <div class="cabecalho_analises" onclick="toggleAnalises()"> <!-- Cabeçalho clicável da aba -->

    <strong>Análises da imagem</strong> <!-- Título da aba -->

    <span id="iconeAnalises">▲ Abrir análises</span> <!-- Texto/ícone da aba -->

  </div> <!-- Fecha cabeçalho -->

  <div class="conteudo_analises"> <!-- Conteúdo da aba -->

    <canvas id="histograma"></canvas> <!-- Canvas onde o histograma será desenhado -->

    <div> <!-- Container das métricas -->

      <div class="metrica">Média: <span id="media">---</span></div> <!-- Métrica média -->

      <div class="metrica">Mínimo: <span id="minimo">---</span></div> <!-- Métrica mínimo -->

      <div class="metrica">Máximo: <span id="maximo">---</span></div> <!-- Métrica máximo -->

      <div class="metrica">Arquivo atual: <span id="arquivoAtual">---</span></div> <!-- Nome do arquivo atual -->

    </div> <!-- Fecha métricas -->

  </div> <!-- Fecha conteúdo da aba -->

</div> <!-- Fecha aba de análises -->

<!-- Arquivo JavaScript separado da página -->
<script src="processamento.js"></script>

</body> <!-- Fim do corpo -->

</html> <!-- Fim do HTML -->
