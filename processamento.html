<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Processamento</title>

<script src="https://unpkg.com/cornerstone-core@2.6.1/dist/cornerstone.js"></script>
<script src="https://unpkg.com/dicom-parser@1.8.21/dist/dicomParser.js"></script>
<script src="https://unpkg.com/cornerstone-wado-image-loader@4.13.2/dist/cornerstoneWADOImageLoader.bundle.min.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0b1d3a, #050c1a);
  color: white;
  min-height: 100vh;
  display: flex;
}

.menulateral {
  width: 250px;
  background: rgba(10, 20, 40, 0.9);
  padding: 20px;
}

.logo {
  font-size: 24px;
  font-weight: bold;
  margin-bottom: 40px;
}

.principal {
  flex: 1;
  padding: 30px;
  display: grid;
  grid-template-columns: 220px 1fr 280px;
  gap: 20px;
}

.painel {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px;
  padding: 20px;
}

.ferramenta {
  padding: 12px;
  background: rgba(255,255,255,0.08);
  border-radius: 12px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: 0.3s;
}

.ferramenta:hover {
  background: rgba(192,132,252,0.25);
}

.area_visualizacao {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

#visualizadorDicom {
  width: 100%;
  height: 600px;
  background: black;
  border-radius: 20px;
  overflow: hidden;
}

#imagemNormal {
  width: 100%;
  max-height: 600px;
  display: none;
  border-radius: 20px;
  background: black;
  object-fit: contain;
}

.arquivo_item {
  padding: 10px;
  background: rgba(255,255,255,0.08);
  border-radius: 10px;
  margin-bottom: 8px;
  cursor: pointer;
  font-size: 13px;
  word-break: break-word;
}

.arquivo_item:hover {
  background: rgba(192,132,252,0.25);
}

.bloco {
  padding: 12px;
  background: rgba(192,132,252,0.15);
  border: 1px solid rgba(192,132,252,0.35);
  border-radius: 12px;
  margin-bottom: 10px;
}

@media (max-width: 900px) {
  body {
    height: auto;
  }

  .menulateral {
    display: none;
  }

  .principal {
    grid-template-columns: 1fr;
  }

  #visualizadorDicom {
    height: 400px;
  }
}
</style>
</head>

<body>

<div class="menulateral">
  <div class="logo">Processamento Imagem Médica</div>
  <p>Visualização DICOM e imagens comuns</p>
</div>

<div class="principal">

  <div class="painel">
    <h3>Ferramentas</h3>
    <br>

    <div class="ferramenta" onclick="addBlock('Filtro Gaussiano')">Filtro Gaussiano</div>
    <div class="ferramenta" onclick="addBlock('Threshold')">Threshold</div>
    <div class="ferramenta" onclick="addBlock('Canny')">Canny</div>
    <div class="ferramenta" onclick="addBlock('Histograma')">Histograma</div>
    <div class="ferramenta" onclick="addBlock('Segmentação')">Segmentação</div>
  </div>

  <div class="area_visualizacao">
    <h1>Área de processamento</h1>

    <div id="visualizadorDicom"></div>
    <img id="imagemNormal">

    <p id="status">Carregando arquivos...</p>
  </div>

  <div class="painel">
    <h3>Arquivos</h3>
    <br>
    <div id="listaArquivos"></div>

    <br>

    <h3>Blocos usados</h3>
    <br>

    <div id="areaBlocos">
      <p style="opacity: 0.6;">Clique em uma ferramenta.</p>
    </div>
  </div>

</div>

<script>
const DB_NAME = "MedicalImagesDB";
const DB_VERSION = 6;

const visualizadorDicom = document.getElementById("visualizadorDicom");
const imagemNormal = document.getElementById("imagemNormal");
const statusText = document.getElementById("status");
const listaArquivos = document.getElementById("listaArquivos");

cornerstoneWADOImageLoader.external.cornerstone = cornerstone;
cornerstoneWADOImageLoader.external.dicomParser = dicomParser;

cornerstoneWADOImageLoader.configure({
  useWebWorkers: false
});

cornerstone.enable(visualizadorDicom);

function openDatabase() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(DB_NAME, DB_VERSION);

    request.onupgradeneeded = function(event) {
      const db = event.target.result;

      if (!db.objectStoreNames.contains("files")) {
        db.createObjectStore("files", {
          keyPath: "id",
          autoIncrement: true
        });
      }

      if (!db.objectStoreNames.contains("recent")) {
        db.createObjectStore("recent", {
          keyPath: "id",
          autoIncrement: true
        });
      }
    };

    request.onsuccess = function() {
      resolve(request.result);
    };

    request.onerror = function() {
      reject(request.error);
    };
  });
}

function getFiles(db) {
  return new Promise((resolve, reject) => {
    const transaction = db.transaction("files", "readonly");
    const store = transaction.objectStore("files");
    const request = store.getAll();

    request.onsuccess = function() {
      resolve(request.result);
    };

    request.onerror = function() {
      reject(request.error);
    };
  });
}

async function loadFiles() {
  try {
    const db = await openDatabase();
    const files = await getFiles(db);

    if (files.length === 0) {
      statusText.innerText = "Nenhum arquivo encontrado.";
      return;
    }

    listaArquivos.innerHTML = "";

    files.forEach((item) => {
      const div = document.createElement("div");
      div.className = "arquivo_item";
      div.innerText = item.name;

      div.onclick = function() {
        openFile(item);
      };

      listaArquivos.appendChild(div);
    });

    openFile(files[0]);

  } catch (error) {
    console.error(error);
    statusText.innerText = "Erro ao carregar arquivos.";
  }
}

function openFile(item) {
  statusText.innerText = "Abrindo: " + item.name;

  if (item.type === "dicom") {
    imagemNormal.style.display = "none";
    visualizadorDicom.style.display = "block";

    try {
      const dicomFile = new File([item.file], item.name);
      const imageId = cornerstoneWADOImageLoader.wadouri.fileManager.add(dicomFile);

      cornerstone.loadImage(imageId)
        .then(function(image) {
          cornerstone.displayImage(visualizadorDicom, image);
          cornerstone.resize(visualizadorDicom, true);

          statusText.innerText = "DICOM carregado: " + item.name;
        })
        .catch(function(error) {
          console.error(error);

          statusText.innerText =
            "Erro ao abrir DICOM. Pode ser DICOM comprimido ou incompatível.";
        });

    } catch (error) {
      console.error(error);
      statusText.innerText = "Erro ao processar DICOM.";
    }

  } else {
    visualizadorDicom.style.display = "none";
    imagemNormal.style.display = "block";

    const imageURL = URL.createObjectURL(item.file);
    imagemNormal.src = imageURL;

    statusText.innerText = "Imagem carregada: " + item.name;
  }
}

function addBlock(name) {
  const areaBlocos = document.getElementById("areaBlocos");

  if (areaBlocos.querySelector("p")) {
    areaBlocos.innerHTML = "";
  }

  const bloco = document.createElement("div");
  bloco.className = "bloco";
  bloco.innerText = name;

  areaBlocos.appendChild(bloco);
}

loadFiles();
</script>

</body>
</html>
