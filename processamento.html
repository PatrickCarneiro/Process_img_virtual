<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <title>Processamento</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/cornerstone-core@2.6.1/dist/cornerstone.js"></script> <!-- Biblioteca principal para exibir imagens médicas -->

  <script src="https://unpkg.com/dicom-parser@1.8.21/dist/dicomParser.js"></script> <!-- Biblioteca que lê a estrutura interna de arquivos DICOM -->

  <script src="https://unpkg.com/cornerstone-wado-image-loader@4.13.2/dist/cornerstoneWADOImageLoader.bundle.min.js"></script>  <!-- Biblioteca que carrega imagens DICOM para o Cornerstone -->


  <style>

    /* RESET GERAL DA PÁGINA */

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box; /* Inclui padding e borda no tamanho total */
    }

    /* DESIGN GERAL DO CORPO DA PÁGINA */

    body {
      font-family: Arial, sans-serif; /* Fonte principal */
      background: linear-gradient(135deg, #0b1d3a, #050c1a); /* Fundo em degradê escuro */
      color: white;
      min-height: 100vh; /* Ocupa a altura inteira da tela */
      display: flex; /* Menu lateral e conteúdo lado a lado */
      overflow-x: hidden; /* Impede rolagem horizontal */
      overflow-y: auto; /* Permite rolagem vertical */
    }

    /* DESIGN DO MENU LATERAL */

    .menulateral {
      width: 230px; /* Largura inicial do menu */
      min-height: 100vh;
      background: rgba(10, 20, 40, 0.95);
      color: white;
      padding: 20px;
      transition: 0.3s; /* Suaviza abertura e fechamento */
      position: sticky; /* Mantém fixo ao rolar */
      top: 0;
      border-right: 1px solid rgba(255,255,255,0.08);
    }

    .menulateral.fechado {
      width: 70px; /* Largura quando fechado */
    }

    /* DESIGN DO LOGO DO MENU */

    .logo {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 25px;
    }
    .menulateral.fechado .logo,
    .menulateral.fechado .texto-menu {
      display: none; /* Esconde textos quando o menu fecha */
    }

    /* DESIGN DO MENU */

    .botao-menu {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: rgba(192,132,252,0.25);
      color: white;
      cursor: pointer;
      margin-bottom: 20px;
    }
    .menu-item {
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 10px;
      cursor: pointer;
      background: rgba(255,255,255,0.06);
    }
    .menu-item:hover {
      background: rgba(192,132,252,0.25);
    }

    /* LAYOUT PRINCIPAL */

    .principal {
      flex: 1; /* Ocupa o espaço restante */
      display: grid; /* Organiza ferramentas, imagem e fluxograma */
      grid-template-columns: 260px minmax(500px, 1fr) 320px;
      grid-template-rows: auto auto;
      gap: 15px;
      padding: 15px;
      padding-bottom: 90px; /* Espaço para a aba de análises */
    }

    /* DESIGN DOS PAINÉIS */

    .painel {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 18px;
      overflow: auto; /* Permite rolagem interna */
    }

    /* DESIGN DAS CATEGORIAS DE FERRAMENTAS */

    .categoria-titulo {
      background: rgba(192,132,252,0.30);
      color: #ffffff;
      padding: 13px;
      border-radius: 12px;
      margin-bottom: 8px;
      cursor: pointer;
      font-weight: bold;
      border: 1px solid rgba(192,132,252,0.45);
      transition: 0.3s;
    }
    .categoria-titulo:hover {
      background: rgba(192,132,252,0.45);
    }
    .categoria-conteudo {
      display: none; /* Começa fechada */
      margin-bottom: 15px;
      padding-left: 8px;
      border-left: 2px solid rgba(192,132,252,0.35);
    }

    /* DESIGN DAS FERRAMENTAS */

    .ferramenta {
      padding: 10px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: 0.3s;
    }
    .ferramenta:hover {
      background: rgba(255,255,255,0.15);
    }
    .parametros {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 12px;
      margin-top: 4px;
      margin-bottom: 10px;
      display: none; /* Começa escondida */
    }
    .parametros h4 {
      margin-bottom: 10px;
      color: #c084fc;
    }
    .parametros label {
      display: block; /* Cada label em uma linha */
      font-size: 13px;
      margin-top: 8px;
    }
    .parametros input,
    .parametros select {
      width: 100%;
      padding: 8px;
      margin-top: 4px;
      border-radius: 8px;
      border: none;
      outline: none;
    }
    .botao-aplicar {
      width: 100%;
      padding: 10px;
      margin-top: 12px;
      border: none;
      border-radius: 10px;
      background: rgba(192,132,252,0.35);
      color: white;
      cursor: pointer;
    }
    .botao-aplicar:hover {
      background: rgba(192,132,252,0.55);
    }

    /* DESIGN DA ÁREA CENTRAL DE VISUALIZAÇÃO */

    .area_visualizacao {
      display: flex;
      flex-direction: column; /* Organiza elementos em coluna */
      gap: 10px;
      align-items: center;
    }
    .area_visualizacao h1,
    .area_visualizacao p {
      width: 100%;
    }

    /* DESIGN DA LINHA DE VISUALIZAÇÃO */

    .linha_visualizacao {
      display: grid;
      grid-template-columns: 48px 1fr; /* Botões laterais + imagem */
      align-items: center;
      width: 100%;
      column-gap: 8px;
    }

    /* DESIGN DA CAIXA DA IMAGEM */

    .visualizacao_box {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 0;
      padding: 12px;
      overflow: auto; /* Permite rolagem quando a imagem é maior */
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 14px;
      width: 100%;
      max-width: 100%;
      height: 70vh;
      min-width: 0;
    }
    .visualizacao_box.zoom_aplicado {
      justify-content: flex-start; /* Facilita navegar com zoom */
      align-items: flex-start;
    }

    /* DESIGN DOS BOTÕES LATERAIS DA IMAGEM */

    .botoes_laterais_imagem {
      display: flex;
      flex-direction: column; /* Um botão abaixo do outro */
      gap: 8px;
      align-items: center;
      justify-content: flex-start;
      align-self: start;
      padding-top: 4px;
    }
    .botao_pixel,
    .botao_zoom,
    .botao_pan,
    .botao_original {
      width: 42px;
      height: 42px;
      border-radius: 50%; /* Deixa circular */
      border: 1px solid rgba(192,132,252,0.55);
      background: rgba(192,132,252,0.18);
      color: white;
      cursor: pointer;
      transition: 0.3s;
      display: flex; /* Centraliza o símbolo */
      align-items: center;
      justify-content: center;
      line-height: 1;
      padding: 0;
    }
    .botao_pixel {
      font-size: 24px;
      justify-self: start;
    }
    .botao_zoom {
      font-size: 30px;
    }
    .botao_pan,
    .botao_original {
      font-size: 20px;
    }
    .botao_pixel:hover,
    .botao_zoom:hover,
    .botao_pan:hover,
    .botao_original:hover {
      background: rgba(192,132,252,0.35);
      transform: scale(1.05);
    }
    .botao_pixel.ativo,
    .botao_zoom.ativo,
    .botao_pan.ativo,
    .botao_original.ativo {
      background: rgba(192,132,252,0.55);
      box-shadow: 0 0 12px rgba(192,132,252,0.65);
    }

    /* DESIGN DA INFORMAÇÃO DO PIXEL */

    .info_pixel {
      display: none; /* Aparece quando a inspeção de pixel é ativada */
      margin-top: 8px;
      padding: 8px 14px;
      border-radius: 10px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      color: #ffffff;
      font-size: 13px;
      opacity: 0.85;
    }

    /* CURSORES DAS FERRAMENTAS DA IMAGEM */

    .zoom_ativo {
      cursor: zoom-in;
    }
    .pan_ativo {
      cursor: grab;
    }
    .pan_arrastando {
      cursor: grabbing;
    }

    /* DESIGN DA IMAGEM NORMAL */

    #imagemNormal {
      display: none;
      width: auto;
      height: auto;
      max-width: none;
      max-height: none;
      object-fit: contain;
      transform-origin: center center; /* Base do zoom */
      transition: none;
    }

    /* DESIGN DO VISUALIZADOR DICOM */

    #visualizadorDicom {
      background: black;
      border-radius: 0;
      overflow: hidden;
      display: none;
      user-select: none;
      flex: 0 0 auto;
      max-width: none;
      max-height: none;
      transform-origin: center center; /* Base do zoom */
      transition: transform 0.08s ease-out;
    }

    /* DESIGN DO FLUXOGRAMA */

    #areaFluxograma {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .bloco_fluxo {
      width: 100%;
      padding: 12px;
      background: rgba(192,132,252,0.18);
      border: 1px solid rgba(192,132,252,0.45);
      border-radius: 14px;
      margin-bottom: 8px;
      text-align: center;
    }
    .bloco_fluxo.selecionado_comparativo {
      background: rgba(56,189,248,0.25);
      border: 2px solid rgba(56,189,248,0.9);
      box-shadow: 0 0 14px rgba(56,189,248,0.35);
    }
    .bloco_parametros {
      margin-top: 6px;
      font-size: 12px;
      opacity: 0.8;
      text-align: left;
    }
    .seta {
      font-size: 24px;
      color: #c084fc;
      margin-bottom: 8px;
    }
    .remover {
      margin-top: 8px;
      padding: 6px 10px;
      border: none;
      border-radius: 8px;
      background: rgba(255,80,80,0.25);
      color: white;
      cursor: pointer;
    }
    .remover:hover {
      background: rgba(255,80,80,0.45);
    }

    /* DESIGN DA ÁREA DE IMAGENS EMBAIXO */

    .imagens_trabalho {
      grid-column: 1 / 4; /* Ocupa as três colunas do grid */
      display: flex;
      gap: 15px;
      overflow-x: auto; /* Permite rolagem horizontal */
      min-height: 190px;
    }

    /* DESIGN DO CARD DE IMAGEM */

    .card_imagem {
      min-width: 180px;
      max-width: 180px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 12px;
      cursor: pointer;
      transition: 0.3s;
    }
    .card_imagem:hover {
      background: rgba(192,132,252,0.18);
      transform: translateY(-3px);
    }
    .card_imagem.selecionado {
      background: rgba(192,132,252,0.25);
      border: 2px solid rgba(192,132,252,0.85);
      box-shadow: 0 0 14px rgba(192,132,252,0.35);
    }

    /* DESIGN DA MINIATURA DO CARD */

    .card_imagem img,
    .dicom_thumb {
      width: 100%;
      height: 120px;
      object-fit: contain;
      background: rgba(0,0,0,0.65);
      border-radius: 12px;
      margin-bottom: 8px;
      overflow: hidden;
      display: block;
    }
    .dicom_thumb canvas {
      width: 100% !important;
      height: 100% !important;
    }

    /* DESIGN DO NOME DO ARQUIVO */

    .nome_arquivo {
      font-size: 12px;
      opacity: 0.8;
      word-break: break-word; /* Quebra nomes grandes */
    }

    /* DESIGN DO STATUS E BARRA DE PROCESSAMENTO */

    #status {
      display: inline-block;
      margin-right: 20px;
    }
    #barraProcessamentoContainer {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: 470px;
      vertical-align: middle;
    }
    #barraProcessamentoFundo {
      width: 420px;
      height: 8px;
      background: rgba(255, 255, 255, 0.18);
      border-radius: 999px;
      overflow: hidden;
    }
    #barraProcessamento {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #38bdf8, #2563eb);
      border-radius: 999px;
      transition: width 0.2s ease;
    }
    #barraProcessamentoTexto {
      font-size: 12px;
      color: white;
      min-width: 35px;
    }

    /* DESIGN DAS INFORMAÇÕES DOS PARÂMETROS */

    .campo_parametro_info {
      position: relative;
      margin-bottom: 10px;
    }
    .caixa_info_parametro {
      display: none;
      position: absolute;
      left: 0;
      top: 100%;
      margin-top: 6px;
      background: rgba(10, 20, 40, 0.98);
      color: white;
      border: 1px solid rgba(192,132,252,0.55);
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 12px;
      line-height: 1.3;
      z-index: 999;
      width: 210px;
      box-shadow: 0 0 12px rgba(192,132,252,0.35);
    }
    .campo_parametro_info:hover .caixa_info_parametro {
      display: block; /* Mostra a explicação ao passar o mouse */
    }

    /* DESIGN DAS CAIXAS COM CHECKBOX */

    .caixa_ignorar_zero {
      margin-top: 12px;
      padding: 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      font-size: 13px;
      color: white;
    }
    .caixa_ignorar_zero label {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      cursor: pointer;
      line-height: 1.3;
    }
    .caixa_ignorar_zero input {
      margin-top: 2px;
    }

    /* DESIGN DO COMPARATIVO ORIGINAL E PROCESSADA */

    .area_imagem_original {
      display: none;
      justify-content: center;
      align-items: center;
      flex: 0 0 auto;
      padding-right: 12px;
      border-right: 1px solid rgba(255,255,255,0.15);
    }
    .area_imagem_original.ativo {
      display: flex; /* Mostra a imagem original */
    }
    .area_imagem_processada {
      display: flex;
      justify-content: center;
      align-items: center;
      flex: 0 0 auto;
    }
    #imagemOriginalNormal {
      display: none;
      width: auto;
      height: auto;
      max-width: none;
      max-height: none;
      object-fit: contain;
    }
    #visualizadorDicomOriginal {
      background: black;
      border-radius: 0;
      overflow: hidden;
      display: none;
      user-select: none;
      flex: 0 0 auto;
      max-width: none;
      max-height: none;
    }

  </style>

</head>


<body>

  <!-- MENU LATERAL -->

  <div class="menulateral" id="menulateral">

    <!-- Botão que abre ou fecha o menu -->
    <button class="botao-menu" onclick="toggleMenu()">☰</button>

    <!-- Nome do sistema -->
    <div class="logo">Processamento Imagem Médica</div>

    <!-- Botão para voltar ao início -->
    <div class="menu-item" onclick="window.location.href='index.html'">
      <span class="texto-menu">Início</span>
    </div>

    <!-- Botão de projetos -->
    <div class="menu-item">
      <span class="texto-menu">Projetos</span>
    </div>

  </div>

  <!-- ÁREA PRINCIPAL -->

  <div class="principal">

    <!-- PAINEL DE FERRAMENTAS -->

    <div class="painel">

      <h3>Ferramentas</h3>

      <br>

      <!-- Categoria de filtros -->
      <div class="categoria-titulo" onclick="toggleCategoria('filtros')">
        Filtros
      </div>

      <!-- Conteúdo da categoria filtros -->
      <div class="categoria-conteudo" id="filtros">

        <div
          class="ferramenta"
          id="botaoFerramentaGaussiano"
          onclick="selecionarFerramenta('Filtro Gaussiano', this)"
        >
          Filtro Gaussiano
        </div>

        <div
          class="ferramenta"
          id="botaoFerramentaMediana"
          onclick="selecionarFerramenta('Filtro Mediana', this)"
        >
          Filtro Mediana
        </div>

      </div>

      <!-- Ferramenta de tons de cinza -->
      <div
        class="categoria-titulo"
        onclick="selecionarFerramenta('Converter para tons de cinza', this)"
      >
        Tons de cinza
      </div>

      <!-- Área onde aparecem os parâmetros da ferramenta -->
      <div class="parametros" id="parametros"></div>

      <!-- Opção para ignorar pixels zero -->
      <div class="caixa_ignorar_zero">
        <label>
          <input type="checkbox" id="checkIgnorarZeroFerramentas">
          Sem contabilizar pixels 0
        </label>
      </div>

      <!-- Opção para aplicar em todas as imagens -->
      <div class="caixa_ignorar_zero">
        <label>
          <input type="checkbox" id="checkAplicarTodasImagens">
          Aplicar ferramentas em todas as imagens
        </label>
      </div>

    </div>

    <!-- ÁREA CENTRAL DE VISUALIZAÇÃO -->

    <div class="area_visualizacao">

      <h1>Área de processamento</h1>

      <!-- Linha com botões laterais e imagem -->
      <div class="linha_visualizacao">

        <!-- BOTÕES LATERAIS DA IMAGEM -->

        <div class="botoes_laterais_imagem">

          <!-- Botão para ver coordenada e valor do pixel -->
          <button class="botao_pixel" id="botaoPixel" onclick="togglePixelInfo()" title="Visualizar pixel">
            ⊕
          </button>

          <!-- Botão para ativar zoom -->
          <button class="botao_zoom" id="botaoZoom" onclick="toggleZoomImagem()" title="Ativar zoom">
            ⌕
          </button>

          <!-- Botão para mover a imagem -->
          <button class="botao_pan" id="botaoPan" onclick="togglePanImagem()" title="Mover imagem">
            ⛶
          </button>

          <!-- Botão para comparar original e processada -->
          <button class="botao_original" id="botaoOriginal" onclick="toggleComparativo()" title="Comparativo">
            ⧉
          </button>

        </div>

        <!-- CAIXA DA IMAGEM -->

        <div class="visualizacao_box">

          <!-- Área da imagem original no comparativo -->
          <div id="areaImagemOriginal" class="area_imagem_original">

            <div id="visualizadorDicomOriginal"></div>

            <img id="imagemOriginalNormal">

          </div>

          <!-- Área da imagem processada -->
          <div id="areaImagemProcessada" class="area_imagem_processada">

            <div id="visualizadorDicom"></div>

            <img id="imagemNormal">

          </div>

        </div>

      </div>

      <!-- INFORMAÇÃO DO PIXEL -->

      <div class="info_pixel" id="infoPixel">
        X: --- | Y: --- | Pixel: ---
      </div>

      <!-- TEXTO DE STATUS -->

      <p id="status">Carregando arquivos...</p>

    </div>

    <!-- PAINEL DO FLUXOGRAMA -->

    <div class="painel">

      <h3>Fluxograma</h3>

      <br>

      <!-- Área onde entram as ferramentas aplicadas -->
      <div id="areaFluxograma">

        <p style="opacity: 0.6;">Aplique uma ferramenta para montar o fluxo.</p>

      </div>

    </div>

    <!-- ÁREA INFERIOR COM IMAGENS -->

    <div class="painel imagens_trabalho" id="imagensTrabalho"></div>

  </div>

  <!-- ÁREA DA ABA DE ANÁLISE -->

  <div id="areaAnalise"></div>

  <!-- BIBLIOTECA OPENCV -->

  <script src="https://docs.opencv.org/4.x/opencv.js"></script>

  <!-- ARQUIVOS JAVASCRIPT DO SISTEMA -->

  <script src="analise.js"></script>
  <script src="gaussiano.js"></script>
  <script src="mediana.js"></script>
  <script src="cinza.js"></script>
  <script src="processamento.js"></script>

  <!-- INICIALIZAÇÃO DA PÁGINA -->

  <script>
    loadFiles(); /* Carrega as imagens direto na tela de processamento */
  </script>

</body>

</html>
